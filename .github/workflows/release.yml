name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [windows, linux, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME=oregon-trail-tui
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME=oregon-trail-tui.exe
          fi
          go build -ldflags="-s -w" -o $BINARY_NAME .
          mkdir -p release
          mv $BINARY_NAME release/

      - name: Create archive
        run: |
          cd release
          ARCHIVE_NAME=oregon-trail-tui-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip $ARCHIVE_NAME.zip *
          else
            tar -czvf $ARCHIVE_NAME.tar.gz *
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oregon-trail-tui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/oregon-trail-tui-${{ matrix.goos }}-${{ matrix.goarch }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## 俄勒冈之旅 TUI
            
            经典游戏《俄勒冈之旅》的 TUI 复刻版
            
            ### 下载说明
            
            - **Windows**: `oregon-trail-tui-windows-amd64.zip`
            - **Linux**: `oregon-trail-tui-linux-amd64.tar.gz` 或 `oregon-trail-tui-linux-arm64.tar.gz`
            - **macOS**: `oregon-trail-tui-darwin-amd64.tar.gz` 或 `oregon-trail-tui-darwin-arm64.tar.gz`
            
            ### 运行方式
            
            解压后直接运行可执行文件即可，无需安装 Go 环境。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
